<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quaddraw — infinite canvas</title>
    <script src="./index.ts" type="module"></script>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <section class="canvas-area" id="canvasArea">
          <aside class="toolbar" aria-label="Drawing tools">
            <button class="tool" type="button" data-tool="lasso" title="Lasso ink islands (L)" aria-label="Lasso ink islands">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19.5 10.5c0 3.6-3.4 6.5-7.5 6.5s-7.5-2.9-7.5-6.5S7.9 4 12 4s7.5 2.9 7.5 6.5Z"/><path d="M12 17c0 2.2-1.2 3.5-3 3.5-1.2 0-2-.6-2-1.4 0-.7.6-1.1 1.3-1.1"/></svg>
            </button>
            <button class="tool active" type="button" data-tool="pen" title="Pen (P)" aria-label="Pen">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m14.8 5.2 4 4"/><path d="M4 20l1.2-5.2L15.7 4.3a2.1 2.1 0 0 1 3 0l1 1a2.1 2.1 0 0 1 0 3L9.2 18.8Z"/><path d="m5.2 14.8 4 4"/></svg>
            </button>
            <button class="tool" type="button" data-tool="eraser" title="Eraser (E)" aria-label="Eraser">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m7.3 19.5-3-3a2.4 2.4 0 0 1 0-3.4l8.8-8.8a2.4 2.4 0 0 1 3.4 0l3.2 3.2a2.4 2.4 0 0 1 0 3.4l-8.6 8.6Z"/><path d="m9.2 8.2 6.6 6.6"/><path d="M7.3 19.5H20"/></svg>
            </button>
            <div class="toolbar-rule"></div>
            <button class="tool" type="button" data-tool="hand" title="Pan (H)" aria-label="Pan">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7.5 11V7.5a1.5 1.5 0 0 1 3 0V11"/><path d="M10.5 10V5.5a1.5 1.5 0 0 1 3 0V10"/><path d="M13.5 10V6.5a1.5 1.5 0 0 1 3 0V11"/><path d="M16.5 10a1.5 1.5 0 0 1 3 0v3.5c0 4.4-2.6 7-6.7 7h-.6a6 6 0 0 1-5.1-2.8L4.6 14a1.6 1.6 0 0 1 .3-2.2 1.7 1.7 0 0 1 2.3.3l1.3 1.7"/></svg>
            </button>
            <div class="toolbar-rule"></div>
            <button class="tool" type="button" id="undo" title="Undo (⌘ Z)" aria-label="Undo">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m8 7-4 4 4 4"/><path d="M4 11h9a7 7 0 0 1 7 7"/></svg>
            </button>
            <button class="tool" type="button" id="redo" title="Redo (⇧ ⌘ Z)" aria-label="Redo">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m16 7 4 4-4 4"/><path d="M20 11h-9a7 7 0 0 0-7 7"/></svg>
            </button>
            <div class="toolbar-rule"></div>
            <button class="tool" type="button" id="debugTree" title="Quadtree debug view (Q)" aria-label="Quadtree debug view" aria-pressed="false">
              <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="1.5"/><path d="M12 4v16M4 12h16M12 8h8M16 4v8M4 16h8M8 12v8"/></svg>
            </button>
          </aside>
          <canvas id="drawingCanvas"></canvas>
          <canvas class="debug-flash-canvas" id="debugFlashCanvas" aria-hidden="true"></canvas>
          <div class="brush-cursor" id="brushCursor" aria-hidden="true"><span class="brush-cursor-crosshair"></span></div>
          <div class="canvas-hint" id="canvasHint"><kbd>V</kbd> select &nbsp;·&nbsp; <kbd>L</kbd> lasso &nbsp;·&nbsp; two fingers or <kbd>Space</kbd> + drag to pan &nbsp;·&nbsp; pinch to zoom</div>
          <aside class="inspector" id="inspector">
            <a-color-picker
              class="brush-color-picker"
              id="brushColor"
              value="#393b42"
              palette="#393b42,#f35b4c,#f6ba38,#53b66e,#4c8deb,#8855d4"
              aria-labelledby="brushColorLabel"
            ></a-color-picker>
            <br/>
            <div class="brush-presets" role="group" aria-labelledby="brushPresetLabel">
              <button class="brush-preset selected" type="button" data-brush-preset="ink" aria-pressed="true" title="Crisp, pressure-responsive strokes">
                <span class="brush-sample brush-sample-ink" aria-hidden="true"></span>
                <span>Ink</span>
              </button>
              <button class="brush-preset" type="button" data-brush-preset="bristle" aria-pressed="false" title="A real 2D bristle mask that follows the stroke direction">
                <span class="brush-sample brush-sample-bristle" aria-hidden="true"></span>
                <span>Bristle</span>
              </button>
              <button class="brush-preset" type="button" data-brush-preset="charcoal" aria-pressed="false" title="Grainy, pressure-responsive strokes">
                <span class="brush-sample brush-sample-charcoal" aria-hidden="true"></span>
                <span>Charcoal</span>
              </button>
            </div>
            <br/>
            <label>Weight <div class="weight-row"><input id="weight" type="range" min="1" max="42" value="3" /><output id="weightValue">3 px</output></div></label>
            <details class="brush-settings">
              <summary>Brush settings <span id="brushSettingsValue">Ink</span></summary>
              <div class="brush-settings-body">
                <label for="brushTexture">Texture</label>
                <select id="brushTexture">
                  <option value="solid">Solid</option>
                  <option value="bristle">Bristle mask</option>
                  <option value="charcoal">Charcoal</option>
                </select>
                <label>Density <div class="weight-row"><input id="density" type="range" min="1" max="100" value="100" /><output id="densityValue">100%</output></div></label>
                <label>Dynamics <div class="weight-row"><input id="dynamics" type="range" min="0" max="100" value="100" title="How much velocity and stylus pressure affect stroke thickness" /><output id="dynamicsValue">100%</output></div></label>
              </div>
            </details>
            <section class="layers-panel" aria-labelledby="layersHeading">
              <div class="layers-header">
                <span id="layersHeading">LAYERS</span>
                <div class="layer-actions">
                  <button id="layerMoveUp" type="button" title="Move layer up" aria-label="Move active layer up">↑</button>
                  <button id="layerMoveDown" type="button" title="Move layer down" aria-label="Move active layer down">↓</button>
                  <button id="addLayer" type="button" title="Add layer" aria-label="Add layer">＋</button>
                  <button id="removeLayer" type="button" title="Delete layer" aria-label="Delete active layer">×</button>
                </div>
              </div>
              <div class="layer-list" id="layerList" role="listbox" aria-label="Drawing layers"></div>
              <label class="layer-opacity" for="layerOpacity">Opacity <div class="weight-row"><input id="layerOpacity" type="range" min="0" max="100" value="100" /><output id="layerOpacityValue">100%</output></div></label>
            </section>
          </aside>
          <div class="zoom-controls"><button id="zoomOut">−</button><button id="zoomLevel">100%</button><button id="zoomIn">＋</button></div>
          <div class="minimap"><canvas id="minimapCanvas" width="176" height="111"></canvas></div>
        </section>
      </section>

      <footer class="statusbar">
        <div class="status-left">
          <span><span class="tree-dot"></span> Raster quadtree · <span id="strokeCount">0</span> strokes · <span id="nodeCount">1</span> node · effective <span id="occupiedResolution" title="Max-depth raster resolution covering the bounds of all non-transparent quads">0 × 0 px</span> · snapshot <span id="snapshotCompressedSize" title="Gzip-compressed IndexedDB snapshot payload">0 B</span> compressed / <span id="snapshotUncompressedSize" title="Uncompressed QDR3 binary snapshot payload">0 B</span> raw</span>
        </div>
        <div class="status-right"><button id="exportButton">Export</button><button id="clearButton" class="clear">Clear canvas</button></div>
      </footer>
    </main>
    <div class="toast" id="toast">Canvas exported as PNG</div>
  </body>
</html>
